<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;

      try {
        // Use throw to handle invalid (non-numeric) input
        if (isNaN(firstNum) || isNaN(secondNum) || firstNum === '' || secondNum === '') {
          throw new Error('Please enter valid numbers in both input fields!');
        }

        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (err) {
        // Catch and log the error
        console.error('Validation Error:', err.message);
        output.innerHTML = 'Error: Invalid Input';
      } finally {
        // Log attempt completion
        console.log('Calculation attempt finished.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Helper to get current calculator state dynamically
    const getCalcState = () => ({
      firstNum: document.querySelector('#first-num').value,
      secondNum: document.querySelector('#second-num').value,
      operator: document.querySelector('#operator').value,
      result: document.querySelector('output').innerHTML
    });

    // 0: Console Log
    errorBtns[0].addEventListener('click', () => {
      console.log('Calculator State:', getCalcState());
    });

    // 1: Console Error
    errorBtns[1].addEventListener('click', () => {
      const {firstNum, secondNum} = getCalcState();
      console.error(`Calculation Error with inputs: ${firstNum} and ${secondNum}`);
    });

    // 2: Console Count
    errorBtns[2].addEventListener('click', () => {
      console.count('Count Button Clicked');
    });

    // 3: Console Warn
    errorBtns[3].addEventListener('click', () => {
      const {result} = getCalcState();
      console.warn(`Warning: Result is currently ${result}`);
    });

    // 4: Console Assert
    errorBtns[4].addEventListener('click', () => {
      const {firstNum, secondNum} = getCalcState();
      console.assert(firstNum !== '' && secondNum !== '', 'Both inputs must be filled!');
    });

    // 5: Console Clear
    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    // 6: Console Dir
    errorBtns[6].addEventListener('click', () => {
      console.dir(document.querySelector('form'));
    });

    // 7: Console dirxml
    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.querySelector('form'));
    });

    // 8: Console Group Start
    errorBtns[8].addEventListener('click', () => {
      console.group('Calculator Data Group');
      console.log('State:', getCalcState());
    });

    // 9: Console Group End
    errorBtns[9].addEventListener('click', () => {
      console.groupEnd('Calculator Data Group');
    });

    // 10: Console Table
    errorBtns[10].addEventListener('click', () => {
      console.table([getCalcState()]);
    });

    // 11: Start Timer
    errorBtns[11].addEventListener('click', () => {
      console.time('Timer Button');
    });

    // 12: End Timer
    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('Timer Button');
    });

    // 13: Console Trace
    errorBtns[13].addEventListener('click', () => {
      const traceCalc = () => {console.trace('Trace from calculator button');};
      traceCalc();
    });
  </script>
</body>

</html>
